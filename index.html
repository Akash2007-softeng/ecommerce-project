<!DOCTYPE html>
<html>
<head>
    <title>E-commerce Week 1</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>My E-commerce Store</h1>

    <div class="products">

        <div class="product">
            <h3>Shirt</h3>
            <p>Price: ₹500</p>
            <button onclick="addToCart('Shirt', 500)">Add to Cart</button>
        </div>

        <div class="product">
            <h3>Shoes</h3>
            <p>Price: ₹1200</p>
            <button onclick="addToCart('Shoes', 1200)">Add to Cart</button>
        </div>

        <div class="product">
            <h3>Watch</h3>
            <p>Price: ₹800</p>
            <button onclick="addToCart('Watch', 800)">Add to Cart</button>
        </div>

    </div>

    <h2>Cart</h2>
    <ul id="cart"></ul>

    <script src="script.js"></script>
</body>
</html>
